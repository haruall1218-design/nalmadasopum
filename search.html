---
layout: default
title: Search결과
permalink: /search/
---
<div class="search-page-container" style="padding: 40px 20px;">
  <h2 style="color: #8b5a2b; margin-bottom: 30px; border-bottom: 2px solid #f4ece4; padding-bottom: 10px;">
    🔍 "<span id="search-keyword"></span>" Search결과
  </h2>
  
  <ul id="search-page-results" class="post-list" style="list-style: none; padding: 0;">
    </ul>
</div>

<script>
$(document).ready(function() {
  // 1. 주소창에서 방문자가 친 검색어(keyword) 뽑아내기
  var urlParams = new URLSearchParams(window.location.search);
  var keyword = urlParams.get('keyword');

  if (keyword) {
    $('#search-keyword').text(keyword); // 화면 제목에 검색어 표시

    // 2. 장부(search.json) 불러와서 일치하는 글 찾기
    $.getJSON('{{ "/search.json" | relative_url }}', function(data) {
      var resultsBox = $('#search-page-results');
      var query = keyword.toLowerCase();

      var results = data.filter(function(post) {
        var titleMatch = post.title ? post.title.toLowerCase().indexOf(query) !== -1 : false;
        var tagMatch = post.tags ? post.tags.toLowerCase().indexOf(query) !== -1 : false;
        return titleMatch || tagMatch;
      });

      // 3. 찾은 결과를 본문 화면에 리스트로 뿌려주기
      if (results.length > 0) {
        $.each(results, function(index, post) {
          // 기존 블로그 글 목록 스타일 그대로 적용
          resultsBox.append('<li style="margin-bottom: 15px;"><a href="' + post.url + '" style="text-decoration: none; color: #555; font-size: 1.1rem; transition: color 0.3s;">' + post.title + '</a></li>');
        });
      } else {
        resultsBox.append('<li style="color: #999;">일치하는 글이 없습니다. 다른 검색어를 입력해 보세요.</li>');
      }
    });
  } else {
    $('#search-keyword').text("입력없음");
    $('#search-page-results').append('<li style="color: #999;">검색어를 입력해 주세요.</li>');
  }
});
</script>
