  <script>
$(document).ready(function() {
  $('.filter-btn').on('click', function(e) {
    e.preventDefault(); // 링크 클릭 시 화면이 맨 위로 튕기는 현상 방지

    var filterValue = $(this).data('filter'); // 클릭한 메뉴의 분류값(파우치, 가방 등) 가져오기

    // 1. 메뉴 스타일 변경 (클릭한 메뉴만 굵게 표시)
    $('.filter-btn').css({'font-weight': 'normal', 'color': '#666'});
    $(this).css({'font-weight': 'bold', 'color': '#8b5a2b'}); // 날마다 소품 포인트 컬러

    // 2. 글 필터링 기능
    if(filterValue === 'all') {
      // '전체 보기'를 누르면 모든 글이 서서히 나타남
      $('.post-item').fadeIn(300); 
    } else {
      // 다른 메뉴를 누르면 일단 모든 글을 숨기고
      $('.post-item').hide(); 
      // 클릭한 메뉴의 단어(파우치)를 이름표(data-tag)로 가진 글만 서서히 나타남
      $('.post-item[data-tag*="' + filterValue + '"]').fadeIn(300); 
    }
  });
});
</script>
