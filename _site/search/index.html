<script>
$(document).ready(function() {
  // 1. 주소창에서 방문자가 친 검색어(keyword) 뽑아내기
  var urlParams = new URLSearchParams(window.location.search);
  var keyword = urlParams.get('keyword');

  if (keyword) {
    $('#search-keyword').text(keyword); // 화면 제목에 검색어 표시

    // 2. 장부(search.json) 불러와서 일치하는 글 찾기
    $.getJSON('/search.json', function(data) {
      var resultsBox = $('#search-page-results');
      var query = keyword.toLowerCase();

      var results = data.filter(function(post) {
        var titleMatch = post.title ? post.title.toLowerCase().indexOf(query) !== -1 : false;
        var tagMatch = post.tags ? post.tags.toLowerCase().indexOf(query) !== -1 : false;
        return titleMatch || tagMatch;
      });

      // 3. 찾은 결과를 본문 화면에 리스트로 뿌려주기
      if (results.length > 0) {
        $.each(results, function(index, post) {
          // 기존 블로그 글 목록 스타일 그대로 적용
          resultsBox.append('<li style="margin-bottom: 15px;"><a href="' + post.url + '" style="text-decoration: none; color: #555; font-size: 1.1rem; transition: color 0.3s;">' + post.title + '</a></li>');
        });
      } else {
        resultsBox.append('<li style="color: #999;">일치하는 글이 없습니다. 다른 검색어를 입력해 보세요.</li>');
      }
    });
  } else {
    $('#search-keyword').text("입력없음");
    $('#search-page-results').append('<li style="color: #999;">검색어를 입력해 주세요.</li>');
  }
});
</script>

  <script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    
    // 💡 1단계: 화면 너비가 768px 이하(모바일)일 때만 이 마법이 작동하도록 제한합니다.
    if (window.innerWidth <= 768) {
      
      // 💡 2단계: 본문(p 태그 안)에 있는 이미지만 선택하되, 
      // a 태그(링크)로 감싸져 있거나 메인 상단(hero)에 있는 이미지는 철저히 제외시킵니다.
      const zoomImages = document.querySelectorAll('p img:not(a img)'); 
      
      // 확대할 이미지가 페이지에 있을 때만 기능 실행
      if (zoomImages.length > 0) {
        zoomImages.forEach(function(img) {
          const wrapper = document.createElement('div');
          wrapper.className = 'image-zoom-wrapper';
          img.parentNode.insertBefore(wrapper, img);
          wrapper.appendChild(img);

          const icon = document.createElement('div');
          icon.className = 'zoom-hint-icon';
          icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>';
          wrapper.appendChild(icon);
        });

        const zoom = mediumZoom('.image-zoom-wrapper img', {
          margin: 20,
          background: 'rgba(253, 250, 247, 0.95)'
        });

        const closeBtn = document.createElement('div');
        closeBtn.className = 'zoom-close-btn';
        closeBtn.innerHTML = '&times;'; 
        document.body.appendChild(closeBtn);

        closeBtn.addEventListener('click', function() {
          zoom.close();
        });

       // 사진이 커지면 작동하는 마법
        zoom.on('open', function() {
          closeBtn.classList.add('show'); // X버튼 나타나기
          
          // 💡 수정된 코드: 화면에 있는 '모든' 돋보기 아이콘을 찾아서 한 번에 투명하게 숨깁니다.
          const allIcons = document.querySelectorAll('.zoom-hint-icon');
          allIcons.forEach(function(icon) {
            icon.style.opacity = '0'; 
          });
        });

        // 사진이 원래대로 돌아가면 작동하는 마법
        zoom.on('close', function() {
          closeBtn.classList.remove('show'); // X버튼 숨기기
          
          // 💡 수정된 코드: 숨겼던 '모든' 돋보기 아이콘을 다시 나타나게 합니다.
          const allIcons = document.querySelectorAll('.zoom-hint-icon');
          allIcons.forEach(function(icon) {
            icon.style.opacity = '1'; 
          });
        });
      }
    }
    
  });
</script>

<!-- 라이트박스 배경 (바둑판 이미지 보이기) -->
<div id="lightbox-overlay">
  <span id="lightbox-close">&times;</span>
  <span id="lightbox-prev" class="lightbox-nav">&#10094;</span> <!-- 왼쪽 화살표 -->
  <img id="lightbox-image" src="" alt="확대된 이미지">
  <span id="lightbox-next" class="lightbox-nav">&#10095;</span> <!-- 오른쪽 화살표 -->
</div>

<!-- 스크립트 (바둑판 이미지 보이기) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  $(document).ready(function() {
    var $images = $('.checkerboard-grid img');
    var currentIndex = 0; // 현재 보고 있는 이미지의 순서
    
    // 1. 이미지를 클릭해서 열 때
    $(document).on('click', '.checkerboard-grid img', function(e) {
      e.preventDefault();
      currentIndex = $images.index(this); // 클릭한 이미지가 몇 번째인지 파악
      updateImage();
      $('#lightbox-overlay').fadeIn(200);
    });

    // 2. 이미지 변경 함수 (이전/다음)
    function updateImage() {
      // 첫 사진에서 왼쪽으로 가면 마지막 사진으로, 마지막에서 오른쪽으로 가면 첫 사진으로 무한 루프
      if (currentIndex < 0) {
        currentIndex = $images.length - 1;
      } else if (currentIndex >= $images.length) {
        currentIndex = 0;
      }
      
      var imgSrc = $images.eq(currentIndex).attr('src');
      
      // 이미지가 바뀔 때 살짝 깜빡이는 애니메이션으로 부드럽게 전환
      $('#lightbox-image').fadeOut(100, function() {
        $(this).attr('src', imgSrc).fadeIn(100);
      });
    }

    // 3. PC: 화살표 클릭 이벤트
    $(document).on('click', '#lightbox-prev', function(e) {
      e.stopPropagation();
      currentIndex--;
      updateImage();
    });
    $(document).on('click', '#lightbox-next', function(e) {
      e.stopPropagation();
      currentIndex++;
      updateImage();
    });

    // 4. 모바일: 스와이프(터치 슬라이드) 이벤트
    var touchstartX = 0;
    var touchendX = 0;

    // 손가락이 닿았을 때의 X 좌표 기록
    $(document).on('touchstart', '#lightbox-image', function(e) {
      touchstartX = e.originalEvent.changedTouches[0].screenX;
    });

    // 손가락이 떨어졌을 때의 X 좌표 기록 및 방향 계산
    $(document).on('touchend', '#lightbox-image', function(e) {
      touchendX = e.originalEvent.changedTouches[0].screenX;
      handleSwipe();
    });

    function handleSwipe() {
      var swipeThreshold = 50; // 이 픽셀(50px) 이상 밀어야 넘어감 (살짝 터치와 구분)
      
      if (touchendX < touchstartX - swipeThreshold) {
        // 왼쪽으로 밀었을 때 (다음 사진)
        currentIndex++;
        updateImage();
      }
      if (touchendX > touchstartX + swipeThreshold) {
        // 오른쪽으로 밀었을 때 (이전 사진)
        currentIndex--;
        updateImage();
      }
    }

    // 5. 닫기 처리 (배경이나 X버튼 클릭 시에만 닫힘)
    $(document).on('click', '#lightbox-overlay, #lightbox-close', function(e) {
      // 클릭한 타겟이 화살표나 이미지가 아닐 때만 창을 닫음
      if (e.target.id === 'lightbox-overlay' || e.target.id === 'lightbox-close') {
        $('#lightbox-overlay').fadeOut(200);
      }
    });
  });
</script>

 <script>
$(document).ready(function() {
  
  /* ====================================
     1. 왼쪽 메뉴 필터링 기능 (제작 노트 등)
  ==================================== */
  $('.filter-btn').on('click', function(e) {
    e.preventDefault(); // 링크 클릭 시 화면 위로 튕기는 현상 방지
    
    var filterValue = $(this).data('filter'); // 클릭한 메뉴의 분류값(파우치, 가방 등) 가져오기
    
    // 메뉴 스타일 변경 (클릭한 메뉴만 굵게, 날마다 소품 포인트 컬러 적용)
    $('.filter-btn').css({'font-weight': 'normal', 'color': '#666'});
    $(this).css({'font-weight': 'bold', 'color': '#8b5a2b'});

    // 글 필터링 작동
    if(filterValue === 'all') {
      // '전체 보기' 클릭 시 모든 글 표시
      $('.post-item').fadeIn(300);
    } else {
      // 다른 메뉴 클릭 시 일치하는 태그(data-tag)를 가진 글만 표시
      $('.post-item').hide();
      $('.post-item[data-tag*="' + filterValue + '"]').fadeIn(300);
    }
  });

  /* ====================================
     2. 상단 검색창 엔터키 기능 (검색 페이지로 이동)
  ==================================== */
  $('#search-input').on('keypress', function(e) {
    // 키보드에서 누른 버튼이 '엔터(번호 13번)'일 때 작동
    if (e.which == 13) { 
      e.preventDefault(); // 엔터 쳤을 때 화면이 위로 튕기는 기본 증상 방지
      
      var keyword = $(this).val(); // 검색창에 적힌 글자 가져오기
      
      if (keyword.length > 0) {
        // 검색어가 있으면 '/search/' 주소로 검색어를 달고 이동
        window.location.href = '/search/?keyword=' + encodeURIComponent(keyword);
      } else {
        // 검색어가 없으면 경고창 띄우기
        alert("검색어를 입력해 주세요!");
      }
    }
  });

  /* ====================================
     3. 위로 가기 버튼 (Scroll to Top) 기능
  ==================================== */
  // 화면을 스크롤할 때마다 실행
  $(window).scroll(function() {
    // 위에서부터 300px 이상 스크롤을 내리면
    if ($(this).scrollTop() > 300) {
      $('#scroll-top-btn').fadeIn(300); // 버튼 스르륵 나타남
    } else {
      $('#scroll-top-btn').fadeOut(300); // 다시 맨 위로 가면 스르륵 사라짐
    }
  });

  // 버튼을 클릭했을 때 실행
  $('#scroll-top-btn').click(function(e) {
    e.preventDefault(); // 링크 기본 성질(위로 튕김) 방지
    
    // 0.4초(400ms) 동안 화면 맨 위(scrollTop: 0)로 부드럽게 올라가기
    $('html, body').animate({scrollTop: 0}, 400); 
    return false;
  });

});
</script>
