  <h2 style="color: #8b5a2b; margin-bottom: 30px; border-bottom: 2px solid #f4ece4; padding-bottom: 10px;">
    🔍 "<span id="search-keyword"></span>" Search결과
  </h2>
  
  <ul id="search-page-results" class="post-list" style="list-style: none; padding: 0;">
    </ul>
</div>

<script>
$(document).ready(function() {
  // 1. 주소창에서 방문자가 친 검색어(keyword) 뽑아내기
  var urlParams = new URLSearchParams(window.location.search);
  var keyword = urlParams.get('keyword');

  if (keyword) {
    $('#search-keyword').text(keyword); // 화면 제목에 검색어 표시

    // 2. 장부(search.json) 불러와서 일치하는 글 찾기
    $.getJSON('/search.json', function(data) {
      var resultsBox = $('#search-page-results');
      var query = keyword.toLowerCase();

      var results = data.filter(function(post) {
        var titleMatch = post.title ? post.title.toLowerCase().indexOf(query) !== -1 : false;
        var tagMatch = post.tags ? post.tags.toLowerCase().indexOf(query) !== -1 : false;
        return titleMatch || tagMatch;
      });

      // 3. 찾은 결과를 본문 화면에 리스트로 뿌려주기
      if (results.length > 0) {
        $.each(results, function(index, post) {
          // 기존 블로그 글 목록 스타일 그대로 적용
          resultsBox.append('<li style="margin-bottom: 15px;"><a href="' + post.url + '" style="text-decoration: none; color: #555; font-size: 1.1rem; transition: color 0.3s;">' + post.title + '</a></li>');
        });
      } else {
        resultsBox.append('<li style="color: #999;">일치하는 글이 없습니다. 다른 검색어를 입력해 보세요.</li>');
      }
    });
  } else {
    $('#search-keyword').text("입력없음");
    $('#search-page-results').append('<li style="color: #999;">검색어를 입력해 주세요.</li>');
  }
});
</script>

 <script>
$(document).ready(function() {
  
  /* ====================================
     1. 왼쪽 메뉴 필터링 기능 (제작 노트 등)
  ==================================== */
  $('.filter-btn').on('click', function(e) {
    e.preventDefault(); // 링크 클릭 시 화면 위로 튕기는 현상 방지
    
    var filterValue = $(this).data('filter'); // 클릭한 메뉴의 분류값(파우치, 가방 등) 가져오기
    
    // 메뉴 스타일 변경 (클릭한 메뉴만 굵게, 날마다 소품 포인트 컬러 적용)
    $('.filter-btn').css({'font-weight': 'normal', 'color': '#666'});
    $(this).css({'font-weight': 'bold', 'color': '#8b5a2b'});

    // 글 필터링 작동
    if(filterValue === 'all') {
      // '전체 보기' 클릭 시 모든 글 표시
      $('.post-item').fadeIn(300);
    } else {
      // 다른 메뉴 클릭 시 일치하는 태그(data-tag)를 가진 글만 표시
      $('.post-item').hide();
      $('.post-item[data-tag*="' + filterValue + '"]').fadeIn(300);
    }
  });

  /* ====================================
     2. 상단 검색창 엔터키 기능 (검색 페이지로 이동)
  ==================================== */
  $('#search-input').on('keypress', function(e) {
    // 키보드에서 누른 버튼이 '엔터(번호 13번)'일 때 작동
    if (e.which == 13) { 
      e.preventDefault(); // 엔터 쳤을 때 화면이 위로 튕기는 기본 증상 방지
      
      var keyword = $(this).val(); // 검색창에 적힌 글자 가져오기
      
      if (keyword.length > 0) {
        // 검색어가 있으면 '/search/' 주소로 검색어를 달고 이동
        window.location.href = '/search/?keyword=' + encodeURIComponent(keyword);
      } else {
        // 검색어가 없으면 경고창 띄우기
        alert("검색어를 입력해 주세요!");
      }
    }
  });

  /* ====================================
     3. 위로 가기 버튼 (Scroll to Top) 기능
  ==================================== */
  // 화면을 스크롤할 때마다 실행
  $(window).scroll(function() {
    // 위에서부터 300px 이상 스크롤을 내리면
    if ($(this).scrollTop() > 300) {
      $('#scroll-top-btn').fadeIn(300); // 버튼 스르륵 나타남
    } else {
      $('#scroll-top-btn').fadeOut(300); // 다시 맨 위로 가면 스르륵 사라짐
    }
  });

  // 버튼을 클릭했을 때 실행
  $('#scroll-top-btn').click(function(e) {
    e.preventDefault(); // 링크 기본 성질(위로 튕김) 방지
    
    // 0.4초(400ms) 동안 화면 맨 위(scrollTop: 0)로 부드럽게 올라가기
    $('html, body').animate({scrollTop: 0}, 400); 
    return false;
  });

});
</script>
