---
layout: default
---

<article class="post-container">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      작성일: <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y년 %m월 %d일" }}</time>
      {% if page.categories %}
        <span class="post-categories"> | 카테고리: {{ page.categories | join: ", " }}</span>
      {% endif %}
    </p>
  </header>

  <div class="ad-space ad-top">
    <p>[본문 상단 애드센스 광고가 들어갈 자리]</p>
  </div>

  <div class="post-content">
    {{ content }}
  </div>

  <div class="ad-space ad-bottom">
    <p>[본문 하단 애드센스 광고가 들어갈 자리]</p>
  </div>

  <footer class="post-footer" style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
    
    {% if page.categories.size > 0 %}
      <a href="{{ '/category/' | append: page.categories.first | append: '/' }}" class="back-to-list">← 카테고리 목록으로</a>
    {% endif %}

    <a href="{{ '/' }}" class="back-to-list">🏠 전체 메인으로</a>
  </footer>

</article>
