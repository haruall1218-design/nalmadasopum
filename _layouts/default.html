<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>{% if page.title %}{{ page.title }} - {% endif %}날마다 소품 Story</title>
  
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}정성스럽게 지은 패브릭 소품과 따뜻한 일상을 기록합니다.{% endif %}">
  
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">

  </head>
<body>

  {% include header.html %}

  <main class="page-content" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}

</body>
</html>
