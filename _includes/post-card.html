{%- for post in site.posts -%}{%- if post.url == include.url -%}<div class="naver-card-item"><a href="{{ site.baseurl }}{{ post.url }}" class="naver-card-link"><div class="naver-card-img-wrap"><img src="{{ post.image }}" alt="{{ post.title }}" class="naver-card-img"></div><div class="naver-card-info"><h4 class="naver-card-title">{{ post.title }}</h4><p class="naver-card-desc">{{ post.excerpt | strip_html | truncatewords: 10 }}</p><p class="naver-card-domain">nalmadasopum.com</p></div></a></div>{%- break -%}{%- endif -%}{%- endfor -%}
