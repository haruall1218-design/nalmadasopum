  <script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    
    // 💡 1단계: 화면 너비가 768px 이하(모바일)일 때만 이 마법이 작동하도록 제한합니다.
    if (window.innerWidth <= 768) {
      
      // 💡 2단계: 본문(p 태그 안)에 있는 이미지만 선택하되, 
      // a 태그(링크)로 감싸져 있거나 메인 상단(hero)에 있는 이미지는 철저히 제외시킵니다.
      const zoomImages = document.querySelectorAll('p img:not(a img)'); 
      
      // 확대할 이미지가 페이지에 있을 때만 기능 실행
      if (zoomImages.length > 0) {
        zoomImages.forEach(function(img) {
          const wrapper = document.createElement('div');
          wrapper.className = 'image-zoom-wrapper';
          img.parentNode.insertBefore(wrapper, img);
          wrapper.appendChild(img);

          const icon = document.createElement('div');
          icon.className = 'zoom-hint-icon';
          icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>';
          wrapper.appendChild(icon);
        });

        const zoom = mediumZoom('.image-zoom-wrapper img', {
          margin: 20,
          background: 'rgba(253, 250, 247, 0.95)'
        });

        const closeBtn = document.createElement('div');
        closeBtn.className = 'zoom-close-btn';
        closeBtn.innerHTML = '&times;'; 
        document.body.appendChild(closeBtn);

        closeBtn.addEventListener('click', function() {
          zoom.close();
        });

       // 사진이 커지면 작동하는 마법
        zoom.on('open', function() {
          closeBtn.classList.add('show'); // X버튼 나타나기
          
          // 💡 수정된 코드: 화면에 있는 '모든' 돋보기 아이콘을 찾아서 한 번에 투명하게 숨깁니다.
          const allIcons = document.querySelectorAll('.zoom-hint-icon');
          allIcons.forEach(function(icon) {
            icon.style.opacity = '0'; 
          });
        });

        // 사진이 원래대로 돌아가면 작동하는 마법
        zoom.on('close', function() {
          closeBtn.classList.remove('show'); // X버튼 숨기기
          
          // 💡 수정된 코드: 숨겼던 '모든' 돋보기 아이콘을 다시 나타나게 합니다.
          const allIcons = document.querySelectorAll('.zoom-hint-icon');
          allIcons.forEach(function(icon) {
            icon.style.opacity = '1'; 
          });
        });
      }
    }
    
  });
</script>

<!-- 라이트박스 배경 (바둑판 이미지 보이기) -->
<div id="lightbox-overlay">
  <span id="lightbox-close">&times;</span>
  <span id="lightbox-prev" class="lightbox-nav">&#10094;</span> <!-- 왼쪽 화살표 -->
  <img id="lightbox-image" src="" alt="확대된 이미지">
  <span id="lightbox-next" class="lightbox-nav">&#10095;</span> <!-- 오른쪽 화살표 -->
</div>

<!-- 스크립트 (바둑판 이미지 보이기) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  $(document).ready(function() {
    // 만약의 경우를 대비해 페이지 로드 시 팝업창을 강제로 숨김 처리
    $('#lightbox-overlay').hide();

    var $images;
    var currentIndex = 0;
    
    // 1. 이미지를 클릭해서 열 때 (감지 범위를 .diet-grid 내부로 엄격하게 제한)
    $('.checkerboard-grid').on('click', 'img', function(e) {
      e.preventDefault();
      e.stopPropagation(); // 클릭 신호가 다른 곳으로 튀는 것을 완벽 차단

      $images = $('.checkerboard-grid img'); 
      currentIndex = $images.index(this);
      
      // 이미지를 정확히 인식했을 때만 창을 띄움
      if (currentIndex !== -1) {
        updateImage();
        $('#lightbox-overlay').fadeIn(200);
      }
    });

    // 2. 이미지 변경 함수
    function updateImage() {
      if (currentIndex < 0) {
        currentIndex = $images.length - 1; 
      } else if (currentIndex >= $images.length) {
        currentIndex = 0; 
      }
      var imgSrc = $images.eq(currentIndex).attr('src');
      $('#lightbox-image').attr('src', imgSrc);
    }

    // 3. PC: 화살표 클릭 이벤트 (이벤트 전파 차단)
    $('#lightbox-prev').on('click', function(e) {
      e.preventDefault();
      e.stopPropagation(); 
      currentIndex--;
      updateImage();
    });
    
    $('#lightbox-next').on('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      currentIndex++;
      updateImage();
    });

    // 4. 모바일: 스와이프(터치 슬라이드) 이벤트
    var touchstartX = 0;
    var touchendX = 0;

    $('#lightbox-image').on('touchstart', function(e) {
      touchstartX = e.originalEvent.changedTouches[0].screenX;
    });

    $('#lightbox-image').on('touchend', function(e) {
      touchendX = e.originalEvent.changedTouches[0].screenX;
      handleSwipe();
    });

    function handleSwipe() {
      var swipeThreshold = 50; 
      if (touchendX < touchstartX - swipeThreshold) {
        currentIndex++;
        updateImage();
      } else if (touchendX > touchstartX + swipeThreshold) {
        currentIndex--;
        updateImage();
      }
    }

    // 5. 닫기 처리 (클릭한 곳이 화살표나 이미지가 아닐 때만 창을 닫음)
    $('#lightbox-overlay, #lightbox-close').on('click', function(e) {
      if ($(e.target).closest('#lightbox-prev, #lightbox-next, #lightbox-image').length === 0) {
        $('#lightbox-overlay').fadeOut(200);
      }
    });
  });
</script>
