    document.addEventListener('DOMContentLoaded', function() {

      mediumZoom(zoomImages, {
        margin: 20, /* 확대되었을 때 화면 테두리와의 여백 */
        background: 'rgba(253, 250, 247, 0.95)' /* 날마다 소품 감성에 맞춘 아주 연한 베이지색 반투명 배경 */
