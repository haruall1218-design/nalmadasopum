---
layout: default
title: BRAND STORY
permalink: /category/about/
---

<section class="category-page">
  <header class="post-header">
    <h2 class="post-title">✂️ Brnad story</h2>
    <p class="post-meta">브랜드 이야기를 올립니다.</p>
  </header>

  <br>


  <ul class="post-list" id="paginated-list">
    {% for post in site.categories["about"] %}
      <li class="post-item" data-tag="{{ post.tags | join: ' ' }}">
        <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </li>
    {% else %}
      <p>Nothing has been written yet.</p>
    {% endfor %}
  </ul>

</section>
